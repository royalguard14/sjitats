<!DOCTYPE html>
<html>
<head>
    <title>AI Security System</title>
</head>

<body style="background:black; color:white; text-align:center;">

    <h1>🔒 AI Security System</h1>

    <h2 id="face">Face: Unknown</h2>
    <h3 id="system">System: ---</h3>
    <h3 id="alarm">Alarm: ---</h3>

    <button onclick="arm()">🟢 ARM</button>
    <button onclick="disarm()">🔴 DISARM</button>

    <br><br>

    <img src="/video" width="70%">

    <h3>Logs:</h3>
    <div id="logs"></div>

    <h3>Manage Faces</h3>

    <input type="text" id="name" placeholder="Enter name">
    <br><br>

    <button onclick="addPerson()">➕ Add Person</button>
    <button onclick="removePerson()">❌ Remove Person</button>

    <script>
        function arm() { fetch('/arm'); }
        function disarm() { fetch('/disarm'); }

        function addPerson() {
            let name = document.getElementById("name").value;
            fetch('/add_person/' + name);
        }

        function removePerson() {
            let name = document.getElementById("name").value;
            fetch('/remove_person/' + name);
        }

        setInterval(() => {

            fetch('/logs')
                .then(res => res.json())
                .then(data => {
                    let logsDiv = document.getElementById("logs");
                    logsDiv.innerHTML = "";
                    data.forEach(log => {
                        let p = document.createElement("p");
                        p.textContent = log;
                        logsDiv.appendChild(p);
                    });
                });

            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    document.getElementById("face").innerText =
                        "Face: " + data.name;

                    document.getElementById("system").innerText =
                        "System: " + (data.armed ? "ARMED" : "DISARMED");

                    document.getElementById("alarm").innerText =
                        "Alarm: " + (data.alarm ? "ON" : "OFF");
                });

        }, 1000);
    </script>

</body>
</html>
