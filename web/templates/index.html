<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security System</title>
<style>
body { font-family: Arial; background: #111; color: #eee; }
.container { display: flex; flex-wrap: wrap; }
.video-container, .logs-container, .known-container { margin: 10px; padding: 10px; background: #222; border-radius: 10px; }
.video-container { flex: 2 1 600px; }
.logs-container { flex: 1 1 300px; max-height: 500px; overflow-y: scroll; }
.known-container { flex: 1 1 300px; }
button { margin: 2px; padding: 5px 10px; }
</style>
</head>
<body>
<h1>🚀 AI Security System</h1>
<div class="container">
  <div class="video-container">
    <img id="video" src="/video" width="640" height="480">
  </div>

  <div class="logs-container">
    <h3>📜 Logs</h3>
    <ul id="logs">
      {% for log in logs %}
      <li>{{ log }}</li>
      {% endfor %}
    </ul>
  </div>

  <div class="known-container">
    <h3>🧑 Known Persons</h3>
    <ul id="persons">
      {% for person in known_persons %}
      <li>{{ person }} <button onclick="removePerson('{{ person }}')">Remove</button></li>
      {% endfor %}
    </ul>
    <input type="text" id="new_person" placeholder="New person name">
    <button onclick="addPerson()">Add</button>
  </div>
</div>

<script>
function fetchLogs(){
  fetch("/logs").then(res=>res.json()).then(data=>{
    const logEl = document.getElementById("logs");
    logEl.innerHTML = "";
    data.forEach(l=>{ const li=document.createElement("li"); li.innerText=l; logEl.appendChild(li); });
    logEl.scrollTop = logEl.scrollHeight;
  });
}
setInterval(fetchLogs, 2000);

function addPerson(){
  const name = document.getElementById("new_person").value.trim();
  if(name) fetch("/add_person/"+name).then(()=>{ document.getElementById("new_person").value=""; });
}

function removePerson(name){
  fetch("/remove_person/"+name).then(()=>{ fetchPersons(); });
}

function fetchPersons(){
  fetch("/").then(res=>res.text()).then(html=>{
    const temp = document.createElement("div");
    temp.innerHTML = html;
    const list = temp.querySelectorAll("#persons li");
    const personsEl = document.getElementById("persons");
    personsEl.innerHTML = "";
    list.forEach(li=>{ personsEl.appendChild(li); });
  });
}
setInterval(fetchPersons, 5000);
</script>
</body>
</html>
