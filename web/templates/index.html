<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
        h1 { color: #333; }
        #video-stream { border: 2px solid #333; }
        #logs { max-height: 200px; overflow-y: scroll; border: 1px solid #333; padding: 5px; background: #fff; }
        #known-people { margin-top: 20px; }
        .person { display: flex; justify-content: space-between; margin: 5px 0; }
        button { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>AI Security System</h1>

    <h2>Live Camera</h2>
    <img id="video-stream" src="/video" width="640" height="480">

    <h2>Logs</h2>
    <div id="logs"></div>

    <h2>Known People</h2>
    <div id="known-people">
        {% for person in known_people %}
        <div class="person" data-name="{{ person }}">
            <span>{{ person }}</span>
            <button onclick="removePerson('{{ person }}')">Remove</button>
        </div>
        {% endfor %}
    </div>

    <h3>Add Person</h3>
    <input type="text" id="new-person-name" placeholder="Enter name">
    <button onclick="addPerson()">Add</button>

    <script>
        // =========================
        // FETCH LOGS
        // =========================
        async function fetchLogs() {
            const res = await fetch('/logs');
            const logs = await res.json();
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = logs.map(l => l).join('<br>');
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        setInterval(fetchLogs, 1000);

        // =========================
        // ADD PERSON
        // =========================
        async function addPerson() {
            const name = document.getElementById('new-person-name').value;
            if (!name) return alert("Enter a name");
            const res = await fetch('/add_person', {
                method: 'POST',
                body: new URLSearchParams({name})
            });
            const data = await res.json();
            alert(data.status);
            location.reload();
        }

        // =========================
        // REMOVE PERSON
        // =========================
        async function removePerson(name) {
            const res = await fetch(`/remove_person/${name}`);
            const data = await res.json();
            alert(data.status);
            location.reload();
        }
    </script>
</body>
</html>
