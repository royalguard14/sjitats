<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #020617;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
        }

        #video {
            width: 100%;
            border-radius: 10px;
        }

        #logs {
            height: 250px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            font-size: 13px;
            border-radius: 5px;
        }

        .person {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 6px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .status {
            margin-bottom: 5px;
        }

    </style>
</head>

<body>

<header>🛡️ AI Security Dashboard</header>

<div class="container">

    <!-- LEFT SIDE -->
    <div>

        <div class="card">
            <h2>📷 Live Camera</h2>
            <img id="video" src="/video">
        </div>

        <div class="card">
            <h2>📜 Logs</h2>
            <div id="logs"></div>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div>

        <!-- STATUS -->
        <div class="card">
            <h2>📊 Status</h2>

            <div class="status">
                System: <span id="armed">DISARMED</span>
            </div>

            <div class="status">
                Alarm: <span id="alarm">OFF</span>
            </div>

            <div class="status">
                Last: <span id="name">None</span>
            </div>

            <br>

            <button onclick="arm()">ARM</button>
            <button onclick="disarm()">DISARM</button>
        </div>

        <!-- KNOWN PEOPLE -->
        <div class="card">
            <h2>👤 Known People</h2>

            <div id="people">
                {% for person in known_people %}
                <div class="person">
                    <span>{{ person }}</span>
                    <button onclick="removePerson('{{ person }}')">Remove</button>
                </div>
                {% endfor %}
            </div>

            <input id="newName" placeholder="Enter name">
            <button onclick="addPerson()">Add Person</button>
        </div>

        <!-- SETTINGS -->
        <div class="card">
            <h2>⚙️ Settings</h2>

            <label><input type="checkbox" id="motion"> Enable Motion</label><br>
            <label><input type="checkbox" id="face"> Enable Face Recognition</label><br>
            <label><input type="checkbox" id="notif"> Enable Telegram</label><br>
            <label><input type="checkbox" id="use_knn"> Use KNN</label><br>

            <br>

            <label>Motion Sensitivity</label>
            <input id="motion_sens" type="number" step="0.1">

            <label>Face Threshold</label>
            <input id="face_thresh" type="number" step="0.1">

            <br><br>

            <h3>📩 Telegram</h3>

            <label>Token</label>
            <input id="telegram_token" placeholder="Telegram Bot Token">

            <label>Chat ID</label>
            <input id="telegram_chat" placeholder="Chat ID">

            <br>

            <button onclick="saveSettings()">Save Settings</button>
        </div>

    </div>

</div>

<script>

    // =========================
    // LIVE STATUS
    // =========================
    async function fetchStatus() {
        const res = await fetch('/status');
        const data = await res.json();

        document.getElementById('armed').textContent = data.armed ? "ARMED" : "DISARMED";
        document.getElementById('alarm').textContent = data.alarm ? "ON" : "OFF";
        document.getElementById('name').textContent = data.name;
    }

    setInterval(fetchStatus, 1000);

    // =========================
    // LOGS (scrollable)
    // =========================
    async function fetchLogs() {
        const res = await fetch('/logs');
        const logs = await res.json();

        const div = document.getElementById('logs');
        div.innerHTML = logs.map(l => "• " + l).join("<br>");
        div.scrollTop = div.scrollHeight;
    }

    setInterval(fetchLogs, 1000);

    // =========================
    // ARM / DISARM
    // =========================
    function arm() { fetch('/arm'); }
    function disarm() { fetch('/disarm'); }

    // =========================
    // ADD PERSON
    // =========================
    async function addPerson() {
        const name = document.getElementById('newName').value;
        if (!name) return alert("Enter name");

        await fetch('/add_person', {
            method: 'POST',
            body: new URLSearchParams({ name })
        });

        alert("📸 Capturing...");
        setTimeout(() => location.reload(), 11000);
    }

    // =========================
    // REMOVE PERSON
    // =========================
    async function removePerson(name) {
        await fetch(`/remove_person/${name}`);
        location.reload();
    }

    // =========================
    // SETTINGS
    // =========================
    async function loadSettings() {
        const res = await fetch('/settings');
        const s = await res.json();

        document.getElementById('motion').checked = s.ENABLE_MOTION;
        document.getElementById('face').checked = s.ENABLE_FACE_RECOGNITION;
        document.getElementById('notif').checked = s.ENABLE_NOTIFICATIONS;
        document.getElementById('use_knn').checked = s.USE_KNN;

        document.getElementById('motion_sens').value = s.MOTION_SENSITIVITY;
        document.getElementById('face_thresh').value = s.FACE_RECOGNITION_THRESHOLD;

        document.getElementById('telegram_token').value = s.TELEGRAM_TOKEN;
        document.getElementById('telegram_chat').value = s.TELEGRAM_CHAT_ID;
    }

    async function saveSettings() {
        const data = {
            ENABLE_MOTION: document.getElementById('motion').checked,
            ENABLE_FACE_RECOGNITION: document.getElementById('face').checked,
            ENABLE_NOTIFICATIONS: document.getElementById('notif').checked,
            USE_KNN: document.getElementById('use_knn').checked,

            MOTION_SENSITIVITY: parseFloat(document.getElementById('motion_sens').value),
            FACE_RECOGNITION_THRESHOLD: parseFloat(document.getElementById('face_thresh').value),

            TELEGRAM_TOKEN: document.getElementById('telegram_token').value,
            TELEGRAM_CHAT_ID: document.getElementById('telegram_chat').value
        };

        await fetch('/update_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        alert("✅ Settings saved");
    }

    loadSettings();

</script>

</body>
</html>
